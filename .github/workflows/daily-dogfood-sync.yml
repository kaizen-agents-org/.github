name: Daily Dogfood Sync

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"

permissions:
  contents: read

concurrency:
  group: daily-dogfood-sync-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sync-shared-skills:
    name: Sync deterministic shared skills
    uses: ./.github/workflows/sync-kaizen-shared-skills.yml
    secrets:
      KAIZEN_SYNC_TOKEN: ${{ secrets.KAIZEN_SYNC_TOKEN }}

name: Sync Kaizen Shared Skills

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "skills/**"
      - "scripts/sync-kaizen-shared-skills.sh"
      - ".github/workflows/sync-kaizen-shared-skills.yml"

permissions:
  contents: read

concurrency:
  group: sync-kaizen-shared-skills-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sync:
    name: Sync shared skills to target repositories
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.KAIZEN_SYNC_TOKEN }}
    steps:
      - name: Check token
        run: |
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "KAIZEN_SYNC_TOKEN is required to push branches and create PRs in target repositories." >&2
            exit 1
          fi
          gh auth setup-git

      - name: Checkout source
        uses: actions/checkout@v4
        with:
          path: source
          persist-credentials: false

      - name: Clone target repositories
        run: |
          gh repo clone kaizen-agents-org/builder-agent builder-agent
          gh repo clone kaizen-agents-org/verifier verifier
          gh repo clone kaizen-agents-org/kaizen-loop kaizen-loop

      - name: Sync shared skills
        run: |
          bash source/scripts/sync-kaizen-shared-skills.sh \
            "${PWD}/source" \
            "${PWD}/builder-agent" \
            "${PWD}/verifier" \
            "${PWD}/kaizen-loop"

      - name: Create target PRs
        run: |
          set -euo pipefail
          for repo in builder-agent verifier kaizen-loop; do
            cd "${repo}"
            if [ -z "$(git status --porcelain -- skills)" ]; then
              echo "No skill changes for ${repo}"
              cd ..
              continue
            fi

            branch="codex/sync-kaizen-shared-skills-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
            git config user.name "kaizen-agents-sync"
            git config user.email "actions@github.com"
            git switch -c "${branch}"
            git add skills
            git commit -m "Sync Kaizen shared skills"
            git push -u origin "${branch}"
            body_file="$(mktemp)"
            cat > "${body_file}" <<'EOF'
          ## Summary
          - Sync shared Kaizen Agents skills from kaizen-agents-org/.github.
          - Keep issue-linked PR and bug-routing workflows available in this repository.

          ## Verification
          - Automated sync copied the shared skill directories.

          No source issue; this PR is generated by the shared-skill sync workflow.
          EOF
            gh pr create \
              --repo "kaizen-agents-org/${repo}" \
              --base main \
              --head "${branch}" \
              --title "Sync Kaizen shared skills" \
              --body-file "${body_file}"
            cd ..
          done
